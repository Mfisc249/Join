<!doctype html>
<html lang="en" class="auth-page">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join</title>
    <link rel="icon" href="./assets/icons/favicon-lightmode.svg" type="image/svg+xml" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="./assets/icons/favicon-darkmode.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)" />
    <link rel="stylesheet" href="./style/standard.css" />
    <link rel="stylesheet" href="./style/login.css" />
    <link rel="stylesheet" href="./style/login-responsive.css" />
  </head>
  <body>
    <!-- TEMP: Figma Overlay zum Ausrichten – nach Fertigstellung löschen
    <img id="figmaOverlay" src="./assets/img/figma-overlay-login.png" 
      style="position:fixed; top:0; left:0; width:100%; height:100vh; 
      opacity:0.3; z-index:9999; pointer-events:none; object-fit:fill;" />
    -->
    <div id="content" class="contentWrapper">
      <div id="logoAnimation" class="logoAnimation skipAnimation">
        <div class="logoWrapper">
          <img class="logoDark" src="./assets/icons/logo-login-start.svg" alt="logo" />
          <img class="logoWhite" src="./assets/icons/mobil-logo.svg" alt="" />
        </div>
      </div>

      <main class="loginMainContainer">
        <div class="loginCard">
          <h1>Log in</h1>
          <div class="Separator"></div>
          <form novalidate>
            <div class="loginInputs">
              <div class="InputWrapper">
                <label for="loginEmail" class="visuallyhidden">Email</label>
                <input
                  id="loginEmail"
                  class="InputField"
                  autocomplete="username"
                  type="email"
                  placeholder="Email" />
                <img class="InputFieldIcon" src="./assets/img/mail.svg" alt="Email Icon" />
              </div>
              <div class="InputWrapper">
                <label for="loginPassword" class="visuallyhidden">Password</label>
                <input
                  id="loginPassword"
                  class="InputField"
                  autocomplete="current-password"
                  type="password"
                  placeholder="Password" />
                <img class="InputFieldIcon" src="./assets/img/lock.svg" alt="Password Icon" />
              </div>
              <span id="loginError" class="InputErrorText"></span>
              <div class="loginButtonsWrapper">
                <button class="ButtonBlueFilled" type="submit" id="loginButton">Log in</button>
                <button class="ButtonWhiteBlueOutline" type="button" id="guestButton">
                  Guest Log in
                </button>
              </div>
            </div>
          </form>
        </div>
      </main>

      <nav class="loginNav">
        <div class="loginNewUserWrapper">
          <span>Not a Join user?</span>
          <a href="signup.html" class="ButtonBlueFilled" style="text-decoration: none">Sign up</a>
        </div>
      </nav>

      <footer class="loginFooter">
        <a class="loginFooterLink" href="privacy_policy.html">Privacy Policy</a>
        <a class="loginFooterLink" href="legal_notice.html">Legal notice</a>
      </footer>
    </div>
    <script src="script.js"></script>
    <script src="./JS/login.js"></script>
  </body>
</html>
